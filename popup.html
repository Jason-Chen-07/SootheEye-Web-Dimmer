
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sootheve</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <h1>Sootheve</h1>

    <label class="row">
      <span>Enable</span>
      <input type="checkbox" id="enabled" />
    </label>

    <label class="block">
      <span>Darkness</span>
      <select id="darkness">
        <option value="soft">Soft</option>
        <option value="normal">Normal</option>
        <option value="heavy">Heavy</option>
      </select>
    </label>

    <label class="block">
      <span>Image comfort</span>
      <select id="imageComfort">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </label>

    <label class="block">
      <span>Original preview seconds: <strong id="previewValue">5</strong></span>
      <input type="range" id="originalPreviewSeconds" min="3" max="10" value="5" />
    </label>

    <p class="hint">Force websites into a comfortable night mode.</p >
  </div>

  <script src="popup.js"></script>
</body>
</html>
